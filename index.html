<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VW Motors | Volksnight 27</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">VW Motors</div>
        <nav>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#veiculos">Veículos</a></li>
                <li><a href="#ofertas">Ofertas</a></li>
                <li><a href="#contato">Contato</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="home" class="hero">
            <div class="hero-content">
                <h1>Sinta a emoção de dirigir um Volkswagen</h1>
                <p>Design, tecnologia e performance em cada detalhe.</p>
                <a href="#contato" class="btn-cta">Agendar Test Drive</a>
            </div>
        </section>

        <section id="veiculos" class="showcase">
            <h2>Vitrine de Veículos</h2>
            
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Buscar por modelo (ex: Polo, Nivus)...">
            </div>

            <div id="car-grid" class="grid-container">
                </div>
        </section>
    </main>

    <footer id="contato">
        <p>&copy; 2026 VW Motors. Todos os direitos reservados.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
